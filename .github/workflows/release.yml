name: Release

# The blessed changesets flow. On push to main:
#   - if there are pending changesets, open/update a "Version package" PR (bump + changelog);
#   - if there are none (i.e. that PR was just merged), publish to npm.
# Nothing is ever pushed to main directly, so this coexists with strict branch protection.
#
# Publishing uses npm Trusted Publishing (OIDC) — no npm token. Requires id-token: write and
# npm >= 11.5.1. The Version PR is opened with RELEASE_TOKEN (a PAT) so it triggers the PR
# checks; without that secret it falls back to GITHUB_TOKEN and the PR won't run checks.
on:
  push:
    branches: [main]
  workflow_dispatch: # manual "Run workflow" trigger — publishes any unpublished version on main

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Check out with the PAT so changesets/action pushes the version branch as a real user;
      # a branch pushed with the default GITHUB_TOKEN does not trigger the PR checks, which
      # would leave the "Version package" PR permanently blocked under branch protection.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Ensure OIDC-capable npm
        run: npm install -g npm@latest
      # Build in its own step: changesets/action runs `publish` without a shell, so a compound
      # `npm run build && …` command sends `&& …` to tsc as arguments instead of chaining.
      - name: Build
        run: npm run build
      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npx changeset publish
          commit: Version package
          title: Version package
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
